<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Real-time Chat App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Form Login/Register -->
        <div id="auth-container" class="auth-container">
            <div class="auth-box">
                <h2><i class="fas fa-comments"></i> Chat App</h2>
                <div class="auth-tabs">
                    <button class="tab-btn active" data-tab="login">Login</button>
                    <button class="tab-btn" data-tab="register">Register</button>
                </div>
                
                <form id="login-form" class="auth-form active">
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="login-email" placeholder="Email" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login-password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn-primary">Login</button>
                </form>
                
                <form id="register-form" class="auth-form">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="register-username" placeholder="Username" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="register-email" placeholder="Email" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="register-password" placeholder="Password (min. 6 chars)" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-language"></i>
                        <select id="register-language">
                            <option value="id">Bahasa Indonesia</option>
                            <option value="ja">日本語 (Japanese)</option>
                            <option value="en">English</option>
                            <option value="zh">中文</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Register</button>
                </form>
            </div>
        </div>
        
        <!-- Chat Interface -->
        <div id="chat-container" class="chat-container" style="display: none;">
            <div class="chat-header">
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span id="current-username"></span>
                </div>
                <div class="header-controls">
                    <div class="language-selector">
                        <label>
                            <i class="fas fa-language"></i>
                            <select id="user-language">
                                <option value="id">Bahasa Indonesia</option>
                                <option value="ja">日本語 (Japanese)</option>
                                <option value="en">English</option>
                                <option value="zh">中文</option>
                            </select>
                        </label>
                    </div>
                    <!-- Tombol Mute/Unmute Suara -->
                    <button id="sound-toggle-btn" class="icon-btn" title="Matikan suara">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <!-- Tombol Edit Profil -->
                    <button id="edit-profile-btn" class="icon-btn" title="Edit Profil">
                        <i class="fas fa-user-edit"></i>
                    </button>
                    <!-- Floating Action Button (di header) -->
                    <div class="fab-header-container">
                        <button id="fab-btn" class="icon-btn fab-header-btn" title="Menu Pesan">
                            <i class="fas fa-ellipsis-v"></i>
                        </button>
                        <div id="fab-menu" class="fab-menu-header">
                            <button id="fab-delete" class="fab-option">
                                <i class="fas fa-trash-alt"></i>
                                <span>Delete Message</span>
                            </button>
                            <button id="fab-revoke" class="fab-option">
                                <i class="fas fa-undo-alt"></i>
                                <span>メッセージを撤回する</span>
                            </button>
                        </div>
                    </div>
                    <button id="logout-btn" class="btn-logout">Logout</button>
                </div>
            </div>
            
            <div id="messages-container" class="messages-container">
                <div class="loading-messages">Loading messages...</div>
            </div>
            
            <div class="message-input-container">
                <!-- TOMBOL EMOJI -->
                <button id="emoji-btn" class="icon-btn" title="Emoji">
                    <i class="far fa-smile"></i>
                </button>
                
                <textarea id="message-input" placeholder="Ketik pesan... (Enter untuk kirim)" rows="2"></textarea>
                <button id="send-btn" class="btn-send">Kirim</button>
                
                <!-- EMOJI PICKER CONTAINER -->
                <div id="emoji-picker-container" class="emoji-picker" style="display: none;">
                    <div class="emoji-list">
                        <!-- Emoji akan diisi JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- ============ MODAL KONFIRMASI HAPUS ============ -->
    <div id="delete-modal" class="delete-modal" style="display: none;">
        <div class="delete-modal-content">
            <h3><i class="fas fa-trash-alt"></i> Hapus Pesan</h3>
            <p>Apakah Anda yakin ingin menghapus <span id="selected-count">0</span> pesan yang dipilih?</p>
            <div class="delete-modal-buttons">
                <button id="confirm-delete" class="btn-delete">Hapus</button>
                <button id="cancel-delete" class="btn-cancel">Batal</button>
            </div>
        </div>
    </div>
    
    <!-- ============ MODAL KONFIRMASI REVOKE (撤回) ============ -->
    <div id="revoke-modal" class="revoke-modal" style="display: none;">
        <div class="revoke-modal-content">
            <h3><i class="fas fa-undo-alt"></i> メッセージを撤回する</h3>
            <p><span id="revoke-selected-count">0</span> 件のメッセージを撤回しますか？</p>
            <div class="revoke-modal-buttons">
                <button id="confirm-revoke" class="btn-revoke">撤回する</button>
                <button id="cancel-revoke" class="btn-cancel">キャンセル</button>
            </div>
        </div>
    </div>
    
    <!-- ============ MODAL EDIT PROFIL ============ -->
    <div id="edit-profile-modal" class="edit-modal" style="display: none;">
        <div class="edit-modal-content">
            <h3><i class="fas fa-user-edit"></i> Edit Profil</h3>
            <div class="edit-modal-body">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="edit-username" placeholder="Username baru" autocomplete="off">
                </div>
            </div>
            <div class="edit-modal-buttons">
                <button id="save-profile-btn" class="btn-save">Simpan</button>
                <button id="cancel-edit-btn" class="btn-cancel">Batal</button>
            </div>
            <div id="edit-profile-message" class="edit-message"></div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
